services:
  - type: web
    name: vulcan-stock-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vulcan-stock-db
          property: connectionString
      - key: CHECK_TOKEN
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      # Set SMTP_USER, SMTP_PASS, SMTP_FROM manually in the Render dashboard

databases:
  - name: vulcan-stock-db
    databaseName: vulcan_stock
    user: vulcan
    plan: free
